<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YARMA | Luxury Collective</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; scroll-behavior: smooth; margin: 0; overflow-x: hidden; }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; }
        .glass { background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .font-mag { font-family: 'Syncopate', sans-serif; }
        section { min-height: 100vh; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 100px 20px; }
        .product-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 20px; padding: 20px; width: 100%; }
    </style>
</head>
<body>

<canvas id="canvas3d"></canvas>

<nav class="fixed top-0 w-full z-[100] px-6 py-4 flex justify-between items-center glass">
    <div class="font-mag text-lg text-red-600 cursor-pointer" onclick="window.scrollTo(0,0)">YARMA</div>
    <div class="flex gap-6 text-[10px] font-bold uppercase tracking-widest">
        <button onclick="document.getElementById('shop').scrollIntoView()" class="hover:text-red-600">Shop</button>
        <button onclick="document.getElementById('about').scrollIntoView()" class="hover:text-red-600">About</button>
    </div>
</nav>

<section id="home">
    <h1 class="font-mag text-7xl md:text-9xl mb-4 italic">YARMA</h1>
    <p class="tracking-[0.8em] text-gray-500 text-[10px] mb-12 uppercase">Ishaan & Munendra</p>
    <div class="flex gap-4">
        <button onclick="document.getElementById('shop').scrollIntoView()" class="bg-white text-black px-10 py-4 rounded-full font-black uppercase text-[10px]">Enter Shop</button>
        <button onclick="document.getElementById('about').scrollIntoView()" class="border border-white/20 px-10 py-4 rounded-full font-black uppercase text-[10px]">Our Story</button>
    </div>
</section>

<section id="shop">
    <h2 class="font-mag text-3xl mb-16 text-red-600">THE DROP</h2>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-10 max-w-5xl w-full">
        <div class="product-card">
            <div class="h-80 bg-zinc-900 rounded-2xl mb-4"></div>
            <h3 class="font-bold">VORTEX HOODIE</h3>
            <p class="text-red-600 font-black">₹5,499</p>
            <button onclick="window.location.href='tel:8869089461'" class="w-full mt-4 bg-white text-black py-3 rounded-lg font-black text-xs">BUY NOW</button>
        </div>
        <div class="product-card">
            <div class="h-80 bg-zinc-900 rounded-2xl mb-4"></div>
            <h3 class="font-bold">STEALTH TEE</h3>
            <p class="text-red-600 font-black">₹2,999</p>
            <button onclick="window.location.href='tel:8869089461'" class="w-full mt-4 bg-white text-black py-3 rounded-lg font-black text-xs">BUY NOW</button>
        </div>
    </div>
</section>

<section id="about">
    <div class="max-w-3xl glass p-12 rounded-[2rem] text-center border-t-2 border-red-600">
        <h2 class="font-mag text-xl mb-6 text-red-600">VISION</h2>
        <p class="text-gray-400 leading-relaxed mb-10">Luxury streetwear by Ishaan & Munendra.</p>
        <div class="flex justify-around">
            <div onclick="window.location.href='tel:8869089461'"><p class="text-[10px] text-gray-500 uppercase">Founder</p><p class="font-bold">ISHAAN</p></div>
            <div onclick="window.location.href='tel:8218415994'"><p class="text-[10px] text-gray-500 uppercase">Founder</p><p class="font-bold">MUNENDRA</p></div>
        </div>
    </div>
</section>

<script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas3d'), alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    const geo = new THREE.BufferGeometry();
    const pos = new Float32Array(1500 * 3);
    for(let i=0; i<4500; i++) pos[i] = (Math.random() - 0.5) * 40;
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    const mat = new THREE.PointsMaterial({ size: 0.02, color: 0xffffff });
    const points = new THREE.Points(geo, mat);
    scene.add(points);
    camera.position.z = 5;
    function anim() { requestAnimationFrame(anim); points.rotation.y += 0.001; renderer.render(scene, camera); }
    anim();
</script>
</body>
</html>

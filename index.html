<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YARMA | Luxury Collective</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --brand-red: #ff0000; }
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; scroll-behavior: smooth; margin: 0; overflow-x: hidden; }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; }
        .font-mag { font-family: 'Syncopate', sans-serif; letter-spacing: 2px; }
        .glass { background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        /* Product Detail View (Individual Page) */
        #product-detail-view { position: fixed; inset: 0; background: #000; z-index: 600; display: none; overflow-y: auto; padding: 100px 20px 40px; }
        #product-detail-view.active { display: block; }

        .size-box { border: 1px solid #333; padding: 15px; text-align: center; cursor: pointer; transition: 0.3s; font-size: 11px; font-weight: 600; }
        .size-box.selected { border-color: #fff; background: #fff; color: #000; }

        .product-card { background: #0a0a0a; border: 1px solid #1a1a1a; cursor: pointer; transition: 0.4s; }
        .product-card:hover { border-color: var(--brand-red); }
        .img-container { aspect-ratio: 3/4; background: #111; overflow: hidden; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        
        .btn-main { background: #fff; color: #000; padding: 18px; font-weight: 900; font-size: 11px; text-transform: uppercase; letter-spacing: 3px; width: 100%; border: none; cursor: pointer; }
        .btn-main:hover { background: var(--brand-red); color: #fff; }

        .panel { position: fixed; top: 0; right: 0; height: 100%; width: 100%; max-width: 450px; background: #080808; z-index: 400; transform: translateX(100%); transition: 0.5s; padding: 30px; border-left: 1px solid #222; overflow-y: auto; }
        .panel.active { transform: translateX(0); }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 350; display: none; }
        .overlay.active { display: block; }

        .admin-input { background: #111; border: 1px solid #222; padding: 15px; width: 100%; font-size: 11px; color: #fff; margin-bottom: 10px; outline: none; }
        .admin-input:focus { border-color: var(--brand-red); }
    </style>
</head>
<body>

<canvas id="canvas3d"></canvas>
<div id="overlay" class="overlay" onclick="closeAllPanels()"></div>

<nav class="fixed top-0 w-full z-[100] px-6 py-5 flex justify-between items-center glass">
    <div class="font-mag text-xl text-red-600 cursor-pointer" onclick="window.location.reload()">YARMA</div>
    <div class="flex gap-6 items-center">
        <button onclick="toggleMenu()" class="text-[10px] font-bold tracking-[3px] uppercase">Menu</button>
        <button onclick="togglePanel('cart-panel')" class="relative">
            <span id="cart-count" class="absolute -top-2 -right-2 bg-red-600 text-[8px] w-4 h-4 rounded-full flex items-center justify-center font-bold">0</span>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        </button>
    </div>
</nav>

<section id="shop" class="pt-32 pb-20 px-4 max-w-7xl mx-auto">
    <div id="product-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
</section>

<div id="product-detail-view">
    <button onclick="closeProductView()" class="fixed top-10 left-10 z-[700] text-[10px] font-black tracking-widest bg-white/10 px-4 py-2 rounded-full uppercase">← Return</button>
    <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-12">
        <div id="detail-images" class="flex flex-col gap-4"></div>
        <div class="flex flex-col sticky top-24 h-fit">
            <h2 id="detail-name" class="font-mag text-4xl mb-4 text-red-600"></h2>
            <p id="detail-price" class="text-3xl font-black mb-6 tracking-tighter"></p>
            <p id="detail-desc" class="text-xs opacity-50 leading-relaxed mb-10 max-w-md"></p>
            
            <p class="text-[10px] font-black mb-4 uppercase tracking-[4px]">Size Range (EUR)</p>
            <div class="grid grid-cols-3 gap-2 mb-10">
                <div class="size-box" onclick="selectSize(this, '32-36')">32-36</div>
                <div class="size-box" onclick="selectSize(this, '38-42')">38-42</div>
                <div class="size-box" onclick="selectSize(this, '44-48')">44-48</div>
                <div class="size-box" onclick="selectSize(this, '50-54')">50-54</div>
                <div class="size-box" onclick="selectSize(this, '56-60')">56-60</div>
                <div class="size-box" onclick="selectSize(this, '62')">62</div>
            </div>
            
            <button id="add-to-cart-btn" class="btn-main">Add to Collective</button>
            <div class="mt-12 border-t border-white/5 pt-8">
                <a href="https://instagram.com/yarmaclothingbrand" target="_blank" class="text-[10px] font-bold uppercase tracking-widest flex items-center gap-2">
                    <span class="w-2 h-2 bg-red-600 rounded-full animate-pulse"></span> Connect on Instagram
                </a>
            </div>
        </div>
    </div>
</div>

<div id="admin-panel" class="panel !max-w-[600px]">
    <div class="flex gap-8 mb-10 border-b border-white/5 pb-4">
        <button onclick="switchAdminTab('inventory')" class="text-[10px] font-black tracking-widest opacity-40 focus:opacity-100">INVENTORY</button>
        <button onclick="switchAdminTab('orders')" class="text-[10px] font-black tracking-widest opacity-40 focus:opacity-100">ORDERS</button>
    </div>
    
    <div id="admin-inventory-view">
        <input type="text" id="pName" class="admin-input" placeholder="PRODUCT NAME">
        <input type="number" id="pPrice" class="admin-input" placeholder="PRICE (INR)">
        <textarea id="pDesc" class="admin-input h-24" placeholder="PRODUCT DESCRIPTION"></textarea>
        
        <p class="text-[9px] font-bold opacity-40 mb-3 tracking-widest">IMAGE URLS (MULTIPLE)</p>
        <input type="text" id="pImg1" class="admin-input" placeholder="IMAGE URL 1 (MAIN)">
        <input type="text" id="pImg2" class="admin-input" placeholder="IMAGE URL 2 (DETAIL)">
        <input type="text" id="pImg3" class="admin-input" placeholder="IMAGE URL 3 (DETAIL)">
        
        <button onclick="addProductByUrl()" class="btn-main mt-4">Release Globally</button>
        <div id="aInventory" class="mt-12 space-y-3"></div>
    </div>

    <div id="admin-orders-view" class="hidden">
        <div id="aOrders" class="space-y-4"></div>
    </div>
</div>

<div id="cart-panel" class="panel flex flex-col">
    <h2 class="font-mag text-lg mb-8">BAG</h2>
    <div id="cart-items" class="flex-grow"></div>
    <div class="mt-6 border-t border-white/10 pt-6">
        <div class="flex justify-between text-2xl font-black mb-6"><span>Total</span><span id="cart-total">₹0</span></div>
        <button onclick="togglePanel('checkout-panel')" class="btn-main">Checkout</button>
    </div>
</div>

<div id="track-panel" class="panel">
    <h2 class="font-mag text-lg mb-8">TRACKING</h2>
    <input type="text" id="tInput" class="admin-input" placeholder="ORDER ID (YRM-XXXX)">
    <button onclick="trackNow()" class="btn-main mt-4">Check Status</button>
    <div id="tResult" class="mt-10"></div>
</div>

<script>
    let products = JSON.parse(localStorage.getItem('yrProducts')) || [];
    let cart = [];
    let selectedSize = null;
    const adminPass = "ishaangund";

    // 1. ADD PRODUCT VIA MULTIPLE URLS
    function addProductByUrl() {
        const name = document.getElementById('pName').value.trim();
        const price = document.getElementById('pPrice').value;
        const desc = document.getElementById('pDesc').value.trim();
        const img1 = document.getElementById('pImg1').value.trim();
        const img2 = document.getElementById('pImg2').value.trim();
        const img3 = document.getElementById('pImg3').value.trim();

        if(!name || !price || !img1) return alert("Bhai, Details aur kam se kam 1 Photo URL zaroori hai!");

        let imgArray = [img1];
        if(img2) imgArray.push(img2);
        if(img3) imgArray.push(img3);

        const newP = { id: Date.now(), name, price: parseInt(price), desc, imgs: imgArray, stock: 10 };
        products.unshift(newP);
        localStorage.setItem('yrProducts', JSON.stringify(products));
        
        // Reset Inputs
        document.querySelectorAll('.admin-input').forEach(i => i.value = '');
        renderProducts(); loadInventory(); alert("Product Live!");
    }

    // 2. RENDER & PRODUCT VIEW
    function renderProducts() {
        const list = document.getElementById('product-list');
        list.innerHTML = products.map(p => `
            <div class="product-card" onclick="openProductView(${p.id})">
                <div class="img-container"><img src="${p.imgs[0]}" loading="lazy"></div>
                <div class="p-6">
                    <h3 class="font-mag text-[11px] mb-2 uppercase opacity-80">${p.name}</h3>
                    <p class="font-black text-2xl">₹${p.price.toLocaleString()}</p>
                </div>
            </div>
        `).join('');
    }

    function openProductView(id) {
        const p = products.find(x => x.id === id);
        selectedSize = null;
        document.getElementById('detail-name').innerText = p.name;
        document.getElementById('detail-price').innerText = '₹' + p.price.toLocaleString();
        document.getElementById('detail-desc').innerText = p.desc;
        document.getElementById('detail-images').innerHTML = p.imgs.map(url => `<img src="${url}" class="w-full bg-[#0a0a0a]">`).join('');
        
        document.querySelectorAll('.size-box').forEach(b => b.classList.remove('selected'));
        document.getElementById('add-to-cart-btn').onclick = () => {
            if(!selectedSize) return alert("Please select a size first.");
            cart.push({...p, size: selectedSize});
            updateUI(); closeProductView(); togglePanel('cart-panel');
        };
        document.getElementById('product-detail-view').classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function selectSize(el, s) { 
        document.querySelectorAll('.size-box').forEach(b => b.classList.remove('selected'));
        el.classList.add('selected'); selectedSize = s; 
    }
    
    function closeProductView() { document.getElementById('product-detail-view').classList.remove('active'); document.body.style.overflow = 'auto'; }

    // Logic Utilities (Global Sync ready)
    function togglePanel(id) { closeAllPanels(); document.getElementById(id).classList.add('active'); document.getElementById('overlay').classList.add('active'); }
    function closeAllPanels() { document.querySelectorAll('.panel').forEach(p => p.classList.remove('active')); document.getElementById('overlay').classList.remove('active'); }
    function updateUI() {
        document.getElementById('cart-count').innerText = cart.length;
        let total = cart.reduce((s, i) => s + i.price, 0);
        document.getElementById('cart-total').innerText = '₹' + total.toLocaleString();
        document.getElementById('cart-items').innerHTML = cart.map((i, idx) => `
            <div class="flex gap-4 mb-6 bg-white/5 p-4 items-center">
                <img src="${i.imgs[0]}" class="w-16 h-20 object-cover">
                <div class="flex-grow">
                    <p class="text-[10px] font-black uppercase">${i.name}</p>
                    <p class="text-[10px] opacity-40">SIZE: ${i.size}</p>
                    <p class="text-sm font-bold">₹${i.price}</p>
                </div>
                <button onclick="cart.splice(${idx},1);updateUI()" class="text-red-600 font-bold text-[10px]">REMOVE</button>
            </div>
        `).join('');
    }

    // Initialize
    renderProducts();

    // 3D Background (Same as scratch)
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas3d'), alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    const geo = new THREE.BufferGeometry();
    const pos = new Float32Array(800 * 3);
    for(let i=0; i<2400; i++) pos[i] = (Math.random() - 0.5) * 60;
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    scene.add(new THREE.Points(geo, new THREE.PointsMaterial({ size: 0.04, color: 0xffffff, transparent: true, opacity: 0.2 })));
    camera.position.z = 5;
    function anim() { requestAnimationFrame(anim); scene.rotation.y += 0.0003; renderer.render(scene, camera); }
    anim();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YARMA | Luxury Collective</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; scroll-behavior: smooth; margin: 0; overflow-x: hidden; }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; }
        
        /* Fixed Panel Design - No mixing */
        .panel { 
            position: fixed; top: 0; right: 0; 
            height: 100%; width: 100%; max-width: 450px;
            background: rgba(10, 10, 10, 0.98); /* Solid dark background */
            backdrop-filter: blur(20px);
            z-index: 200; /* Highest priority */
            transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-left: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column;
            padding: 30px;
        }
        .panel.active { transform: translateX(0); box-shadow: -10px 0 30px rgba(0,0,0,0.5); }
        
        /* Backdrop to hide main site when panel is open */
        .overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.7); z-index: 150; 
            display: none; 
        }
        .overlay.active { display: block; }

        .font-mag { font-family: 'Syncopate', sans-serif; }
        .input-style { background: #1a1a1a; border: 1px solid #333; padding: 14px; border-radius: 12px; width: 100%; color: white; outline: none; margin-bottom: 12px; }
        
        .product-card { background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 24px; padding: 24px; transition: 0.3s; }
        section { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 20px; }
        
        /* Track Order Badges */
        .status-badge { padding: 4px 10px; border-radius: 6px; font-size: 10px; font-weight: 900; }
        .status-pending { background: #333; }
        .status-shipped { background: #2563eb; }
        .status-delivered { background: #16a34a; }
    </style>
</head>
<body>

<canvas id="canvas3d"></canvas>
<div id="overlay" class="overlay" onclick="closeAllPanels()"></div>

<nav class="fixed top-0 w-full z-[100] px-6 py-5 flex justify-between items-center bg-black/80 backdrop-blur-md border-b border-white/5">
    <div class="font-mag text-lg text-red-600 tracking-tighter cursor-pointer" onclick="window.scrollTo(0,0)">YARMA</div>
    <div class="flex items-center gap-3">
        <button onclick="togglePanel('track-panel')" class="text-[9px] font-black uppercase border border-white/20 px-3 py-2 rounded-full">Track</button>
        <button onclick="togglePanel('cart-panel')" class="relative bg-white/10 p-3 rounded-full">
            <span id="cart-count" class="absolute -top-1 -right-1 bg-red-600 text-[10px] w-5 h-5 rounded-full flex items-center justify-center font-bold">0</span>
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        </button>
    </div>
</nav>

<div id="track-panel" class="panel">
    <div class="flex justify-between items-center mb-8">
        <h2 class="font-mag text-xl text-red-600">TRACK</h2>
        <button onclick="closeAllPanels()" class="text-2xl">✕</button>
    </div>
    <input type="text" id="trackIdInput" class="input-style" placeholder="Order ID (e.g. YRM-1234)">
    <button onclick="trackOrder()" class="w-full bg-white text-black py-4 rounded-xl font-black text-[10px] uppercase tracking-widest">Search</button>
    <div id="trackResult" class="mt-8"></div>
</div>

<div id="cart-panel" class="panel">
    <div class="flex justify-between items-center mb-8">
        <h2 class="font-mag text-xl">CART</h2>
        <button onclick="closeAllPanels()" class="text-2xl">✕</button>
    </div>
    <div id="cart-items" class="flex-grow overflow-y-auto space-y-4 mb-6"></div>
    <div class="border-t border-white/10 pt-6">
        <div class="flex justify-between font-black text-xl mb-6"><span>TOTAL</span><span id="cart-total">₹0</span></div>
        <button onclick="togglePanel('checkout-panel')" class="w-full bg-white text-black py-4 rounded-xl font-black text-[10px] uppercase">Checkout</button>
    </div>
</div>

<div id="checkout-panel" class="panel">
    <h2 class="font-mag text-xl mb-8 text-red-600">SHIPPING</h2>
    <div class="overflow-y-auto pr-2">
        <input type="text" id="custName" class="input-style" placeholder="Full Name">
        <input type="tel" id="custPhone" class="input-style" placeholder="Mobile">
        <input type="text" id="custCity" class="input-style" placeholder="City">
        <textarea id="custAddress" class="input-style" placeholder="Full Address & Landmark"></textarea>
        <input type="text" id="custPin" class="input-style" placeholder="PIN Code">
        <button onclick="showReview()" class="w-full bg-red-600 text-white py-4 rounded-xl font-black text-[10px] uppercase mt-4">Review Order</button>
        <button onclick="togglePanel('cart-panel')" class="w-full mt-4 text-[10px] opacity-50 uppercase">Back to Cart</button>
    </div>
</div>

<div id="review-panel" class="panel">
    <div id="review-content">
        <h2 class="font-mag text-xl mb-6 text-green-500 uppercase">Confirm</h2>
        <div id="order-summary" class="bg-white/5 p-6 rounded-2xl text-[11px] space-y-2 mb-6 border border-white/10 overflow-y-auto max-h-[250px]"></div>
        <div class="p-4 border border-green-500/30 rounded-xl mb-6 bg-green-500/10 text-center">
            <p class="font-black text-green-500 text-[10px] uppercase tracking-widest">CASH ON DELIVERY</p>
        </div>
        <button onclick="finalSubmit()" class="w-full bg-white text-black py-4 rounded-xl font-black text-[10px] uppercase">Confirm Order</button>
    </div>
</div>

<section id="home">
    <h1 class="font-mag text-7xl md:text-9xl mb-4 italic tracking-tighter">YARMA</h1>
    <p class="tracking-[0.8em] text-gray-500 text-[10px] mb-12 uppercase font-black italic">Luxury Collective</p>
    <button onclick="document.getElementById('shop').scrollIntoView({behavior:'smooth'})" class="bg-white text-black px-12 py-4 rounded-full font-black uppercase text-[10px] tracking-widest">Shop Drop</button>
</section>

<section id="shop">
    <h2 class="font-mag text-2xl mb-12 text-red-600 uppercase tracking-widest">The Latest Collection</h2>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-5xl w-full px-4">
        <div class="product-card">
            <div class="h-64 bg-zinc-900 rounded-2xl mb-6"></div>
            <h3 class="font-bold tracking-widest">VORTEX HOODIE</h3>
            <p class="text-red-600 font-black text-xl">₹5,499</p>
            <button onclick="addToCart('VORTEX HOODIE', 5499)" class="w-full mt-6 bg-white text-black py-4 rounded-xl font-black text-[9px] uppercase">Add to Cart</button>
        </div>
        <div class="product-card">
            <div class="h-64 bg-zinc-900 rounded-2xl mb-6"></div>
            <h3 class="font-bold tracking-widest">STEALTH TEE</h3>
            <p class="text-red-600 font-black text-xl">₹2,999</p>
            <button onclick="addToCart('STEALTH TEE', 2999)" class="w-full mt-6 bg-white text-black py-4 rounded-xl font-black text-[9px] uppercase">Add to Cart</button>
        </div>
    </div>
</section>

<footer class="py-20 text-center border-t border-white/10">
    <a href="https://www.instagram.com/yarmaclothingbrand" class="font-mag text-lg">@YARMACLOTHINGBRAND</a>
    <div class="mt-20 opacity-10 text-[8px] cursor-pointer" onclick="openAdmin()">SYSTEM ACCESS</div>
</footer>

<div id="admin-panel" class="panel !max-w-[600px]">
    <div class="flex justify-between items-center mb-6">
        <h2 class="font-mag text-xl text-yellow-500 uppercase">Admin Database</h2>
        <button onclick="closeAllPanels()" class="text-xl">✕</button>
    </div>
    <div class="grid grid-cols-2 gap-4 mb-6">
        <div class="bg-white/5 p-4 rounded-xl text-center border border-white/10">
            <p class="text-[9px] text-gray-500 uppercase">Orders</p>
            <p id="stat-count" class="text-xl font-black">0</p>
        </div>
        <div class="bg-white/5 p-4 rounded-xl text-center border border-white/10">
            <p class="text-[9px] text-gray-500 uppercase">Sales</p>
            <p id="stat-sales" class="text-xl font-black text-green-500">₹0</p>
        </div>
    </div>
    <div id="admin-orders" class="flex-grow overflow-y-auto space-y-4"></div>
</div>

<script>
    let cart = [];
    const ADMIN_PASS = "ishaangund";

    function togglePanel(id) {
        closeAllPanels();
        document.getElementById(id).classList.add('active');
        document.getElementById('overlay').classList.add('active');
        document.body.style.overflow = 'hidden'; // Lock scroll
    }

    function closeAllPanels() {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.getElementById('overlay').classList.remove('active');
        document.body.style.overflow = 'auto'; // Unlock scroll
    }

    function openAdmin() {
        if(prompt("Enter Password:") === ADMIN_PASS) { togglePanel('admin-panel'); loadAdmin(); }
        else { alert("Wrong!"); }
    }

    function addToCart(name, price) {
        cart.push({name, price});
        updateUI();
        togglePanel('cart-panel');
    }

    function updateUI() {
        const list = document.getElementById('cart-items');
        let total = 0; list.innerHTML = '';
        cart.forEach((item, i) => {
            total += item.price;
            list.innerHTML += `<div class="flex justify-between items-center bg-white/5 p-4 rounded-xl text-xs"><span>${item.name}</span><button onclick="cart.splice(${i},1);updateUI()" class="text-red-600">✕</button></div>`;
        });
        document.getElementById('cart-count').innerText = cart.length;
        document.getElementById('cart-total').innerText = '₹' + total.toLocaleString();
    }

    function showReview() {
        if(!document.getElementById('custName').value) return alert("Fill details!");
        const summary = `ID: NEW\nNAME: ${document.getElementById('custName').value}\nPHONE: ${document.getElementById('custPhone').value}\nCITY: ${document.getElementById('custCity').value}\nADDRESS: ${document.getElementById('custAddress').value}\nPIN: ${document.getElementById('custPin').value}\nITEMS: ${cart.map(i=>i.name).join(', ')}\nTOTAL: ${document.getElementById('cart-total').innerText}`;
        document.getElementById('order-summary').innerText = summary;
        togglePanel('review-panel');
    }

    function finalSubmit() {
        const orderId = "YRM-" + Math.floor(1000 + Math.random() * 9000);
        const orderData = {
            id: orderId, name: document.getElementById('custName').value,
            details: document.getElementById('order-summary').innerText.replace("ID: NEW", "ID: " + orderId),
            amount: parseInt(document.getElementById('cart-total').innerText.replace(/[₹,]/g, '')),
            status: 'Pending', date: new Date().toLocaleString()
        };
        let orders = JSON.parse(localStorage.getItem('yarmaOrders') || '[]');
        orders.unshift(orderData);
        localStorage.setItem('yarmaOrders', JSON.stringify(orders));
        
        document.getElementById('review-panel').innerHTML = `
            <div class="flex flex-col items-center justify-center h-full text-center">
                <div class="w-16 h-16 bg-green-500/20 rounded-full flex items-center justify-center mb-6">✓</div>
                <h2 class="font-mag text-2xl text-green-500 mb-4">ORDER PLACED</h2>
                <div class="bg-white/10 p-6 rounded-2xl w-full mb-6">
                    <p class="text-[10px] text-gray-500 uppercase">Order ID</p>
                    <p class="text-3xl font-black">${orderId}</p>
                </div>
                <button onclick="location.reload()" class="bg-white text-black px-10 py-4 rounded-full font-black text-[10px] uppercase">Back Home</button>
            </div>`;
    }

    function loadAdmin() {
        const orders = JSON.parse(localStorage.getItem('yarmaOrders') || '[]');
        document.getElementById('stat-count').innerText = orders.length;
        const totalSales = orders.reduce((acc, curr) => acc + curr.amount, 0);
        document.getElementById('stat-sales').innerText = '₹' + totalSales.toLocaleString();

        const adminList = document.getElementById('admin-orders');
        adminList.innerHTML = orders.map((o, index) => `
            <div class="bg-white/5 p-4 rounded-xl border border-white/10 text-[10px]">
                <div class="flex justify-between mb-2">
                    <span class="text-yellow-500 font-bold">${o.id}</span>
                    <span class="status-badge status-${o.status.toLowerCase()}">${o.status}</span>
                </div>
                <pre class="whitespace-pre-wrap text-gray-400 font-sans mb-3">${o.details}</pre>
                <select onchange="updateStatus(${index}, this.value)" class="bg-white/10 border border-white/20 text-white p-2 rounded w-full text-[10px]">
                    <option value="" disabled selected>Update Status</option>
                    <option value="Pending">Pending</option>
                    <option value="Shipped">Shipped</option>
                    <option value="Delivered">Delivered</option>
                </select>
            </div>
        `).join('');
    }

    function updateStatus(index, newStatus) {
        let orders = JSON.parse(localStorage.getItem('yarmaOrders') || '[]');
        orders[index].status = newStatus;
        localStorage.setItem('yarmaOrders', JSON.stringify(orders));
        loadAdmin();
    }

    function trackOrder() {
        const id = document.getElementById('trackIdInput').value.trim().toUpperCase();
        const orders = JSON.parse(localStorage.getItem('yarmaOrders') || '[]');
        const order = orders.find(o => o.id === id);
        const res = document.getElementById('trackResult');
        if(order) {
            res.innerHTML = `
                <div class="bg-white/5 p-6 rounded-2xl border border-red-600/30 text-center">
                    <p class="text-[10px] uppercase text-gray-500">Status</p>
                    <p class="text-2xl font-black text-red-600 uppercase mb-2">${order.status}</p>
                    <p class="text-[9px] text-gray-400">Order for: ${order.name}</p>
                </div>`;
        } else {
            res.innerHTML = `<p class="text-red-600 text-[10px] uppercase text-center font-bold">Not Found!</p>`;
        }
    }

    // Three.js Background
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas3d'), alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    const geo = new THREE.BufferGeometry();
    const pos = new Float32Array(1500 * 3);
    for(let i=0; i<4500; i++) pos[i] = (Math.random() - 0.5) * 45;
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    scene.add(new THREE.Points(geo, new THREE.PointsMaterial({ size: 0.02, color: 0xffffff })));
    camera.position.z = 5;
    function anim() { requestAnimationFrame(anim); scene.rotation.y += 0.0006; renderer.render(scene, camera); }
    anim();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YARMA | Luxury Collective</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; margin: 0; overflow-x: hidden; }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.3; }
        .nav-main { position: fixed; top: 0; width: 100%; z-index: 1000; padding: 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.9); border-bottom: 1px solid #111; }
        .panel { position: fixed; top: 0; right: 0; height: 100%; width: 100%; max-width: 500px; background: #050505; z-index: 2000; transform: translateX(100%); transition: 0.5s cubic-bezier(0.7, 0, 0.3, 1); padding: 40px; border-left: 1px solid #1a1a1a; overflow-y: auto; }
        .panel.active { transform: translateX(0); }
        .btn-lux { background: #fff; color: #000; padding: 15px; width: 100%; font-weight: 900; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; border: none; cursor: pointer; margin-top: 10px; }
        .admin-in { background: #111; border: 1px solid #222; padding: 12px; width: 100%; color: #fff; margin-bottom: 8px; font-size: 11px; outline: none; }
        .btn-back { background: #111; border: 1px solid #333; padding: 5px 12px; font-size: 10px; font-weight: 900; cursor: pointer; margin-bottom: 20px; display: inline-block; }
    </style>
</head>
<body>

<canvas id="lux-bg"></canvas>

<nav class="nav-main">
    <button onclick="openPanel('menu-panel')" class="text-[10px] font-black tracking-widest border border-white/10 px-4 py-2">MENU</button>
    <div style="font-family:'Syncopate'; font-size: 22px; font-weight: 700; color: #ff0000;">YARMA</div>
    <button onclick="openPanel('cart-panel')" class="relative">
        <span id="cart-count" class="absolute -top-2 -right-2 bg-red-600 text-[8px] w-4 h-4 rounded-full flex items-center justify-center font-bold">0</span>
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
    </button>
</nav>

<section class="h-screen flex flex-col justify-center items-center text-center px-5">
    <h1 style="font-family:'Syncopate'; font-size: clamp(2.5rem, 12vw, 7rem);" class="mb-5 uppercase">YARMA</h1>
    <p class="max-w-md text-[10px] opacity-50 uppercase tracking-[2px] leading-loose">High-end collective bridging street culture and luxury craftsmanship.</p>
    <button onclick="document.getElementById('shop').scrollIntoView()" class="mt-10 border-b-2 border-red-600 pb-2 text-[9px] font-black tracking-[4px]">BROWSE VAULT</button>
</section>

<section id="shop" class="py-20 px-6 max-w-7xl mx-auto">
    <div id="product-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10"></div>
</section>

<div id="menu-panel" class="panel">
    <div class="btn-back" onclick="closePanels()">← BACK</div>
    <div class="flex flex-col gap-8 font-black text-2xl mt-10">
        <button onclick="closePanels()" class="text-left">THE SHOP</button>
        <button onclick="openPanel('track-panel')" class="text-left">TRACK ORDER</button>
        <button onclick="enterAdmin()" class="opacity-10 text-[10px] text-left mt-20">ADMIN ACCESS</button>
    </div>
</div>

<div id="cart-panel" class="panel">
    <div class="btn-back" onclick="closePanels()">← BACK</div>
    <h2 class="font-bold mb-5 tracking-widest uppercase">Your Selection</h2>
    <div id="cart-items" class="space-y-4"></div>
    
    <div id="checkout-section" class="mt-10 hidden border-t border-white/10 pt-5">
        <h3 class="text-[10px] font-bold mb-4 opacity-50">SHIPPING DETAILS</h3>
        <input type="text" id="custName" class="admin-in" placeholder="FULL NAME">
        <input type="text" id="custPhone" class="admin-in" placeholder="MOBILE NUMBER">
        <textarea id="custAddr" class="admin-in h-20" placeholder="FULL ADDRESS"></textarea>
        <button onclick="placeOrder()" class="btn-lux !bg-red-600 !text-white">PLACE ORDER</button>
    </div>
    
    <div id="cart-summary" class="mt-5 border-t border-white/5 pt-5">
        <div id="cart-total" class="font-bold text-xl mb-4">TOTAL: ₹0</div>
        <button id="chk-btn" onclick="showCheckout()" class="btn-lux">PROCEED TO CHECKOUT</button>
    </div>
</div>

<div id="track-panel" class="panel">
    <div class="btn-back" onclick="openPanel('menu-panel')">← BACK</div>
    <h2 class="font-bold mb-5 uppercase tracking-widest">Trace Order</h2>
    <input type="text" id="tInput" class="admin-in" placeholder="ORDER ID (YRM-XXXX)">
    <button onclick="trackNow()" class="btn-lux">TRACE STATUS</button>
    <div id="tResult" class="mt-10 text-center font-bold text-red-600 text-2xl uppercase"></div>
</div>

<div id="admin-panel" class="panel !max-w-[600px]">
    <div class="btn-back" onclick="closePanels()">← BACK</div>
    <div class="flex gap-5 mb-5 border-b border-white/5 pb-2 text-[10px] font-bold">
        <button onclick="switchTab('inv')">INVENTORY</button>
        <button onclick="switchTab('ord')">CLIENT ORDERS</button>
    </div>
    
    <div id="inv-view">
        <input type="text" id="pName" class="admin-in" placeholder="ITEM NAME">
        <input type="number" id="pPrice" class="admin-in" placeholder="PRICE">
        <input type="text" id="pImg1" class="admin-in" placeholder="IMAGE 1 (MAIN)">
        <input type="text" id="pImg2" class="admin-in" placeholder="IMAGE 2">
        <input type="text" id="pImg3" class="admin-in" placeholder="IMAGE 3">
        <button onclick="addP()" class="btn-lux">PUBLISH RELEASE</button>
        <div id="admin-list" class="mt-8 space-y-2"></div>
    </div>
    
    <div id="ord-view" class="hidden">
        <div id="admin-orders" class="space-y-6"></div>
    </div>
</div>

<script>
    let products = JSON.parse(localStorage.getItem('y_p')) || [];
    let orders = JSON.parse(localStorage.getItem('y_o')) || [];
    let cart = [];

    function enterAdmin() { if(prompt("KEY:") === "ishaangund") { openPanel('admin-panel'); loadInv(); loadOrd(); } }

    function addP() {
        const name = document.getElementById('pName').value;
        const price = document.getElementById('pPrice').value;
        const imgs = [document.getElementById('pImg1').value, document.getElementById('pImg2').value, document.getElementById('pImg3').value].filter(u => u);
        products.unshift({ id: Date.now(), name, price, imgs });
        localStorage.setItem('y_p', JSON.stringify(products));
        render(); loadInv();
    }

    function render() {
        document.getElementById('product-list').innerHTML = products.map(p => `
            <div class="bg-[#080808] border border-[#111] p-4">
                <img src="${p.imgs[0]}" class="w-full aspect-[3/4] object-cover mb-4">
                <p class="text-[9px] opacity-40 uppercase tracking-widest">${p.name}</p>
                <p class="text-xl font-bold mb-4">₹${p.price}</p>
                <button onclick="addToCart(${p.id})" class="btn-lux !bg-white !text-black">ADD TO VAULT</button>
            </div>
        `).join('');
    }

    function addToCart(id) { cart.push(products.find(x => x.id === id)); updateCart(); openPanel('cart-panel'); }

    function updateCart() {
        document.getElementById('cart-count').innerText = cart.length;
        document.getElementById('cart-items').innerHTML = cart.map(item => `<div class="flex justify-between text-[10px] border-b border-white/5 py-2"><span>${item.name}</span><span>₹${item.price}</span></div>`).join('');
        const total = cart.reduce((s, i) => s + parseInt(i.price), 0);
        document.getElementById('cart-total').innerText = 'TOTAL: ₹' + total;
    }

    function showCheckout() { document.getElementById('checkout-section').classList.remove('hidden'); document.getElementById('chk-btn').classList.add('hidden'); }

    function placeOrder() {
        const id = 'YRM-' + Math.floor(1000 + Math.random() * 9000);
        const order = { 
            id, 
            name: document.getElementById('custName').value, 
            phone: document.getElementById('custPhone').value, 
            addr: document.getElementById('custAddr').value,
            items: cart.map(i => i.name).join(', '),
            status: 'Order Packed' 
        };
        orders.unshift(order);
        localStorage.setItem('y_o', JSON.stringify(orders));
        alert("ORDER PLACED! ID: " + id);
        cart = []; updateCart(); closePanels();
    }

    function loadOrd() {
        document.getElementById('admin-orders').innerHTML = orders.map(o => `
            <div class="p-4 bg-white/5 border border-white/10 text-[10px]">
                <p><b>ID:</b> ${o.id} | <b>Name:</b> ${o.name}</p>
                <p><b>Phone:</b> ${o.phone}</p>
                <p><b>Address:</b> ${o.addr}</p>
                <p class="text-red-600 font-bold mt-2 uppercase">Status: ${o.status}</p>
                <select onchange="updateStatus('${o.id}', this.value)" class="bg-black border border-white/20 mt-2 w-full p-2">
                    <option value="">Update Status...</option>
                    <option value="Order Packed">Order Packed</option>
                    <option value="Ready to Ship">Ready to Ship</option>
                    <option value="Shipped">Shipped</option>
                    <option value="Reached Your City">Reached Your City</option>
                    <option value="Out for Delivery">Out for Delivery</option>
                    <option value="Delivered">Delivered</option>
                </select>
            </div>
        `).join('');
    }

    function updateStatus(id, s) { 
        const o = orders.find(x => x.id === id); 
        if(o) { o.status = s; localStorage.setItem('y_o', JSON.stringify(orders)); loadOrd(); }
    }

    function trackNow() {
        const o = orders.find(x => x.id === document.getElementById('tInput').value.trim().toUpperCase());
        document.getElementById('tResult').innerText = o ? o.status : "NOT FOUND";
    }

    function openPanel(id) { closePanels(); document.getElementById(id).classList.add('active'); }
    function closePanels() { document.querySelectorAll('.panel').forEach(p => p.classList.remove('active')); }
    function switchTab(t) { document.getElementById('inv-view').classList.toggle('hidden', t!=='inv'); document.getElementById('ord-view').classList.toggle('hidden', t!=='ord'); }
    function loadInv() { document.getElementById('admin-list').innerHTML = products.map(p => `<div class="flex justify-between p-2 bg-white/5 text-[10px]">${p.name}<button onclick="delP(${p.id})" class="text-red-600">DEL</button></div>`).join(''); }
    function delP(id) { products = products.filter(x => x.id !== id); localStorage.setItem('y_p', JSON.stringify(products)); render(); loadInv(); }

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('lux-bg'), alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    const knot = new THREE.Mesh(new THREE.TorusKnotGeometry(10, 3, 100, 16), new THREE.MeshBasicMaterial({ color: 0x440000, wireframe: true }));
    scene.add(knot); camera.position.z = 30;
    function anim() { requestAnimationFrame(anim); knot.rotation.y += 0.003; renderer.render(scene, camera); }
    anim(); render();
</script>
</body>
</html>

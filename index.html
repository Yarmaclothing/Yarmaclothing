<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YARMA | Official Online Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fff; color: #222; }
        .promo-bar { background-color: #fafafa; border-bottom: 1px solid #eee; text-align: center; padding: 8px; font-size: 11px; letter-spacing: 1px; }
        .nav-container { position: sticky; top: 0; background: white; z-index: 1000; border-bottom: 1px solid #eee; }
        .logo { font-weight: 700; font-size: 32px; color: #e50010; letter-spacing: -1px; }
        .btn-black { background-color: #222; color: #fff; padding: 12px 24px; font-weight: 600; font-size: 12px; text-transform: uppercase; transition: 0.3s; }
        .btn-black:hover { background-color: #444; }
        .product-card img { transition: transform 0.5s ease; }
        .product-card:hover img { transform: scale(1.02); }
        .admin-panel { position: fixed; right: 0; top: 0; height: 100%; width: 100%; max-width: 450px; background: white; z-index: 2000; box-shadow: -5px 0 15px rgba(0,0,0,0.1); transform: translateX(100%); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 30px; overflow-y: auto; }
        .admin-panel.active { transform: translateX(0); }
        .input-hm { border: 1px solid #ccc; padding: 12px; width: 100%; margin-bottom: 10px; border-radius: 2px; font-size: 13px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="promo-bar">FREE SHIPPING ON ORDERS ABOVE ₹1999 | EASY 30-DAY RETURNS</div>

<nav class="nav-container px-6 py-4 flex justify-between items-center">
    <div class="flex gap-6 text-[11px] font-bold uppercase tracking-wider">
        <button onclick="renderShop('Ladies')" class="hover:underline">Ladies</button>
        <button onclick="renderShop('Men')" class="hover:underline">Men</button>
        <button onclick="renderShop('Divided')" class="hover:underline">Divided</button>
        <button onclick="renderShop('Baby')" class="hover:underline">Baby</button>
    </div>
    
    <div class="logo cursor-pointer" onclick="showHome()">YARMA</div>
    
    <div class="flex items-center gap-6">
        <button onclick="enterAdmin()" class="text-[11px] opacity-20">Admin</button>
        <div class="flex items-center gap-1 cursor-pointer" onclick="toggleCart()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
            <span id="cart-count" class="text-[12px] font-bold">0</span>
        </div>
    </div>
</nav>

<main id="main-content">
    <section id="home-sec" class="px-6 py-4">
        <div class="relative w-full h-[70vh] bg-gray-100 flex items-center justify-center overflow-hidden">
            <img src="https://images.unsplash.com/photo-1441986300917-64674bd600d8?auto=format&fit=crop&w=1600&q=80" class="absolute w-full h-full object-cover">
            <div class="relative text-center text-white">
                <h1 class="text-6xl font-bold mb-4">NEW ARRIVALS</h1>
                <p class="mb-8 tracking-widest uppercase">The latest trends for the season</p>
                <button onclick="renderShop('all')" class="bg-white text-black px-8 py-3 font-bold text-xs uppercase">Shop Now</button>
            </div>
        </div>
        
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-10">
            <div class="bg-gray-100 h-64 flex items-center justify-center cursor-pointer" onclick="renderShop('Ladies')"><b>LADIES</b></div>
            <div class="bg-gray-100 h-64 flex items-center justify-center cursor-pointer" onclick="renderShop('Men')"><b>MEN</b></div>
            <div class="bg-gray-100 h-64 flex items-center justify-center cursor-pointer" onclick="renderShop('Divided')"><b>DIVIDED</b></div>
            <div class="bg-gray-100 h-64 flex items-center justify-center cursor-pointer" onclick="renderShop('Accessories')"><b>ACCESSORIES</b></div>
        </div>
    </section>

    <section id="shop-sec" class="hidden px-6 py-10">
        <h2 id="shop-title" class="text-center text-2xl font-bold mb-10 uppercase tracking-widest">All Products</h2>
        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-4 gap-x-4 gap-y-10"></div>
    </section>

    <section id="pdp-sec" class="hidden px-6 py-10 max-w-5xl mx-auto"></section>
</main>

<div id="admin-panel" class="admin-panel">
    <div class="flex justify-between items-center mb-8">
        <h2 class="text-xl font-bold">INVENTORY CONTROL</h2>
        <button onclick="togglePanel('admin-panel')" class="text-2xl">&times;</button>
    </div>
    
    <div class="space-y-4">
        <input id="a-name" class="input-hm" placeholder="Product Name">
        <div class="grid grid-cols-2 gap-2">
            <input id="a-price" class="input-hm" placeholder="Price (INR)">
            <select id="a-cat" class="input-hm">
                <option value="Ladies">Ladies</option>
                <option value="Men">Men</option>
                <option value="Divided">Divided</option>
                <option value="Accessories">Accessories</option>
            </select>
        </div>
        <textarea id="a-colors" class="input-hm h-20" placeholder="Colors (Comma separated: Black, White)"></textarea>
        
        <div id="url-inputs" class="space-y-2">
            <input class="input-hm img-url-input" placeholder="Image URL 1">
        </div>
        <button onclick="addUrlField()" class="text-[11px] underline font-bold">+ ADD ANOTHER IMAGE URL</button>

        <button onclick="saveProduct()" class="btn-black w-full mt-6">Publish Product</button>
    </div>
    
    <hr class="my-8">
    <div id="admin-product-list" class="space-y-4"></div>
</div>

<script>
    let state = JSON.parse(localStorage.getItem('hm_yarma_db')) || { products: [] };
    let cart = [];

    function save() { localStorage.setItem('hm_yarma_db', JSON.stringify(state)); }
    function togglePanel(id) { document.getElementById(id).classList.toggle('active'); }

    function showHome() {
        document.getElementById('home-sec').classList.remove('hidden');
        document.getElementById('shop-sec').classList.add('hidden');
        document.getElementById('pdp-sec').classList.add('hidden');
    }

    function enterAdmin() {
        if(prompt("ENTER SECURITY CODE:") === "Munendrayadav") {
            togglePanel('admin-panel');
            renderAdminProducts();
        }
    }

    function addUrlField() {
        const input = document.createElement('input');
        input.className = 'input-hm img-url-input';
        input.placeholder = `Image URL ${document.querySelectorAll('.img-url-input').length + 1}`;
        document.getElementById('url-inputs').appendChild(input);
    }

    function saveProduct() {
        const urls = Array.from(document.querySelectorAll('.img-url-input')).map(i => i.value).filter(v => v);
        const p = {
            id: Date.now(),
            name: document.getElementById('a-name').value,
            price: document.getElementById('a-price').value,
            cat: document.getElementById('a-cat').value,
            images: urls,
            colors: document.getElementById('a-colors').value.split(',').map(c => c.trim())
        };
        state.products.unshift(p);
        save();
        alert("Product Added!");
        renderAdminProducts();
    }

    function renderAdminProducts() {
        document.getElementById('admin-product-list').innerHTML = state.products.map(p => `
            <div class="flex items-center gap-4 bg-gray-50 p-2 text-[12px]">
                <img src="${p.images[0]}" class="w-12 h-12 object-cover">
                <div class="flex-1">
                    <p class="font-bold">${p.name}</p>
                    <p>₹${p.price}</p>
                </div>
                <button onclick="deleteP(${p.id})" class="text-red-500 font-bold uppercase text-[10px]">Remove</button>
            </div>
        `).join('');
    }

    function deleteP(id) {
        state.products = state.products.filter(p => p.id !== id);
        save();
        renderAdminProducts();
    }

    function renderShop(cat = 'all') {
        document.getElementById('home-sec').classList.add('hidden');
        document.getElementById('pdp-sec').classList.add('hidden');
        document.getElementById('shop-sec').classList.remove('hidden');
        document.getElementById('shop-title').innerText = cat;

        let list = cat === 'all' ? state.products : state.products.filter(p => p.cat === cat);
        
        document.getElementById('product-grid').innerHTML = list.map(p => `
            <div class="product-card cursor-pointer" onclick="openPDP(${p.id})">
                <div class="overflow-hidden bg-gray-100 mb-3">
                    <img src="${p.images[0]}" class="w-full aspect-[2/3] object-cover">
                </div>
                <p class="text-[12px] text-gray-600 mb-1">${p.name}</p>
                <p class="text-[13px] font-bold">Rs. ${p.price}.00</p>
                <div class="flex gap-1 mt-2">
                    ${p.colors.map(c => `<div class="w-2 h-2 rounded-full border border-gray-300" style="background:${c}"></div>`).join('')}
                </div>
            </div>
        `).join('');
    }

    function openPDP(id) {
        const p = state.products.find(x => x.id === id);
        document.getElementById('shop-sec').classList.add('hidden');
        document.getElementById('pdp-sec').classList.remove('hidden');
        
        document.getElementById('pdp-sec').innerHTML = `
            <div class="flex flex-col md:flex-row gap-10">
                <div class="flex-1 space-y-4">
                    ${p.images.map(img => `<img src="${img}" class="w-full">`).join('')}
                </div>
                <div class="w-full md:w-[350px] sticky top-24 h-fit">
                    <h1 class="text-xl font-bold mb-2 uppercase">${p.name}</h1>
                    <p class="text-lg font-medium mb-6">Rs. ${p.price}.00</p>
                    <p class="text-[12px] text-gray-500 mb-2">Category: ${p.cat}</p>
                    <div class="border-t border-b py-4 mb-6">
                        <p class="text-[12px] font-bold mb-3">SELECT SIZE</p>
                        <div class="grid grid-cols-4 gap-2">
                            <button class="border p-2 text-[12px] hover:border-black">S</button>
                            <button class="border p-2 text-[12px] hover:border-black">M</button>
                            <button class="border p-2 text-[12px] hover:border-black">L</button>
                            <button class="border p-2 text-[12px] hover:border-black">XL</button>
                        </div>
                    </div>
                    <button onclick="addToCart(${p.id})" class="btn-black w-full">Add to Bag</button>
                    <p class="text-[11px] mt-6 text-gray-500 leading-relaxed">Delivery in 2-7 days. Cash on delivery available for most pincodes.</p>
                </div>
            </div>
        `;
        window.scrollTo(0,0);
    }

    function addToCart(id) {
        cart.push(state.products.find(p => p.id === id));
        document.getElementById('cart-count').innerText = cart.length;
        alert("Added to bag!");
    }
</script>

</body>
</html>

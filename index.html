<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YARMA LUXE | Official Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'SF Pro Display', -apple-system, sans-serif; background: #000; color: #fff; overflow-x: hidden; }
        
        /* Apple Style Glassmorphism */
        .glass-nav {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: sticky; top: 0; z-index: 1000;
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.1);
        }

        .hero-gradient {
            background: radial-gradient(circle at center, #1d1d1f 0%, #000 100%);
        }

        .apple-btn {
            background: #0071e3;
            color: white;
            padding: 12px 24px;
            border-radius: 980px;
            font-size: 14px;
            font-weight: 400;
            transition: 0.3s;
        }

        .apple-btn:hover { background: #0077ed; transform: scale(1.02); }

        .product-card {
            background: #161617;
            border-radius: 20px;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .product-card:hover { transform: translateY(-10px); }

        .panel {
            position: fixed; right: 0; top: 0; height: 100%; width: 100%; max-width: 500px;
            background: #1d1d1f; z-index: 2000; transform: translateX(100%);
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); padding: 40px; overflow-y: auto;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
        }
        .panel.active { transform: translateX(0); }

        input, select, textarea {
            background: #2d2d2f !important; border: 1px solid #424245 !important;
            color: white !important; padding: 15px; border-radius: 12px; width: 100%;
            margin-bottom: 15px; outline: none;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<nav class="glass-nav px-6 py-4">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
        <div class="text-xl font-semibold tracking-tight cursor-pointer" onclick="showHome()">YARMA <span class="font-light text-gray-400">LUXE</span></div>
        <div class="hidden md:flex gap-8 text-[12px] text-gray-300 font-light">
            <button onclick="renderShop('Store')" class="hover:text-white">Store</button>
            <button onclick="renderShop('Men')" class="hover:text-white">Mac</button>
            <button onclick="renderShop('Ladies')" class="hover:text-white">iPad</button>
            <button onclick="togglePanel('track-panel')" class="hover:text-white">Support</button>
        </div>
        <div class="flex items-center gap-6">
            <button onclick="enterAdmin()" class="opacity-10 text-[10px]">ADMIN</button>
            <div class="relative cursor-pointer" onclick="togglePanel('cart-panel')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                <span id="cart-count" class="absolute -top-2 -right-2 bg-blue-500 text-[10px] w-4 h-4 rounded-full flex items-center justify-center">0</span>
            </div>
        </div>
    </div>
</nav>

<main>
    <section id="home-sec" class="hero-gradient min-h-[90vh] flex flex-col items-center justify-center text-center px-6">
        <h1 class="text-5xl md:text-7xl font-semibold tracking-tight mb-4">Elegance. Redefined.</h1>
        <p class="text-xl md:text-2xl text-gray-400 font-light mb-10">Luxury fashion that speaks for itself.</p>
        <div class="flex gap-4">
            <button onclick="renderShop('all')" class="apple-btn">Shop Now</button>
            <button class="text-blue-500 hover:underline text-lg">Learn more ></button>
        </div>
        <img src="https://images.unsplash.com/photo-1539109136881-3be0616acf4b?auto=format&fit=crop&w=1200" class="mt-20 w-full max-w-4xl rounded-3xl shadow-2xl">
    </section>

    <section id="shop-sec" class="hidden py-24 px-6 max-w-7xl mx-auto">
        <h2 id="shop-title" class="text-4xl font-semibold mb-16">The Collection.</h2>
        <div id="product-grid" class="grid grid-cols-1 md:grid-cols-3 gap-10"></div>
    </section>

    <section id="pdp-sec" class="hidden py-24 px-6 max-w-6xl mx-auto"></section>

    <section id="checkout-sec" class="hidden py-24 px-6 max-w-xl mx-auto text-center">
        <h2 class="text-4xl font-semibold mb-4">Checkout.</h2>
        <p class="text-gray-400 mb-10">Complete your order details below.</p>
        <div class="text-left">
            <input id="c-name" placeholder="Full Name">
            <input id="c-phone" placeholder="Phone Number">
            <textarea id="c-address" placeholder="Shipping Address"></textarea>
            <button onclick="placeOrder()" class="apple-btn w-full py-4 mt-6">Confirm Purchase</button>
        </div>
    </section>

    <section id="thanks-sec" class="hidden py-32 text-center px-6">
        <div class="w-20 h-20 bg-green-500 rounded-full flex items-center justify-center mx-auto mb-10">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path d="M20 6 9 17l-5-5"/></svg>
        </div>
        <h1 class="text-5xl font-semibold mb-4">It's Ordered.</h1>
        <p class="text-gray-400 mb-10">Order ID: <span id="final-oid" class="text-white font-mono"></span></p>
        <button onclick="showHome()" class="text-blue-500 text-lg hover:underline">Return to Home ></button>
    </section>
</main>

<div id="cart-panel" class="panel">
    <div class="flex justify-between items-center mb-10">
        <h2 class="text-2xl font-semibold">Bag</h2>
        <button onclick="togglePanel('cart-panel')" class="text-3xl text-gray-500">&times;</button>
    </div>
    <div id="cart-list" class="space-y-6"></div>
    <div class="mt-10 pt-10 border-t border-gray-800">
        <div class="flex justify-between text-xl font-medium mb-10">
            <span>Total</span>
            <span id="total-price">₹0</span>
        </div>
        <button onclick="startCheckout()" class="apple-btn w-full py-4">Checkout</button>
    </div>
</div>

<div id="track-panel" class="panel">
    <div class="flex justify-between items-center mb-10">
        <h2 class="text-2xl font-semibold">Track Order</h2>
        <button onclick="togglePanel('track-panel')" class="text-3xl text-gray-500">&times;</button>
    </div>
    <input id="t-input" placeholder="YRM-XXXXXX">
    <button onclick="trackOrder()" class="apple-btn w-full">Track Status</button>
    <div id="track-result" class="mt-10 text-center text-xl font-medium text-blue-500"></div>
</div>

<div id="admin-panel" class="panel">
    <div class="flex justify-between items-center mb-10">
        <h2 class="text-2xl font-semibold">Inventory Manager</h2>
        <button onclick="togglePanel('admin-panel')" class="text-3xl text-gray-500">&times;</button>
    </div>
    
    <div class="flex gap-4 mb-10">
        <button onclick="adminTab('add')" class="text-sm font-medium">Add Products</button>
        <button onclick="adminTab('orders')" class="text-sm font-medium opacity-40">Orders</button>
    </div>

    <div id="admin-add-view">
        <input id="a-name" placeholder="Item Name">
        <input id="a-price" placeholder="Price (INR)">
        <select id="a-cat">
            <option value="Store">All Store</option>
            <option value="Men">Men</option>
            <option value="Ladies">Ladies</option>
        </select>
        <div id="url-container">
            <input class="img-url-input" placeholder="Image URL 1">
        </div>
        <button onclick="addUrlField()" class="text-blue-500 text-xs mb-10">+ Add another image URL</button>
        <button onclick="saveProduct()" class="apple-btn w-full">Push to Store</button>
        <div id="admin-product-list" class="mt-10 space-y-3"></div>
    </div>

    <div id="admin-order-view" class="hidden space-y-4"></div>
</div>

<script>
    let state = JSON.parse(localStorage.getItem('yarma_luxury_db')) || { products: [], orders: [] };
    let cart = [];

    const save = () => localStorage.setItem('yarma_luxury_db', JSON.stringify(state));
    const togglePanel = (id) => document.getElementById(id).classList.toggle('active');

    function showHome() {
        document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
        document.getElementById('home-sec').classList.remove('hidden');
        window.scrollTo(0,0);
    }

    function enterAdmin() {
        if(prompt("ACCESS CODE:") === "Munendrayadav") {
            togglePanel('admin-panel');
            renderAdminProducts();
        }
    }

    function addUrlField() {
        const input = document.createElement('input');
        input.className = 'img-url-input';
        input.placeholder = `Image URL ${document.querySelectorAll('.img-url-input').length + 1}`;
        document.getElementById('url-container').appendChild(input);
    }

    function saveProduct() {
        const urls = Array.from(document.querySelectorAll('.img-url-input')).map(i => i.value).filter(v => v);
        const p = {
            id: Date.now(),
            name: document.getElementById('a-name').value,
            price: document.getElementById('a-price').value,
            cat: document.getElementById('a-cat').value,
            images: urls
        };
        state.products.unshift(p); save(); renderAdminProducts(); alert("Product added!");
    }

    function renderAdminProducts() {
        document.getElementById('admin-product-list').innerHTML = state.products.map(p => `
            <div class="flex justify-between bg-black/20 p-4 rounded-xl border border-white/10 text-xs">
                <span>${p.name}</span>
                <button onclick="deleteP(${p.id})" class="text-red-500">Remove</button>
            </div>
        `).join('');
    }

    function deleteP(id) { state.products = state.products.filter(p=>p.id!==id); save(); renderAdminProducts(); }

    function renderShop(cat = 'all') {
        document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
        document.getElementById('shop-sec').classList.remove('hidden');
        document.getElementById('shop-title').innerText = cat === 'all' ? 'The Collection.' : cat;
        
        const list = cat === 'all' ? state.products : state.products.filter(p => p.cat === cat);
        document.getElementById('product-grid').innerHTML = list.map(p => `
            <div class="product-card p-6 cursor-pointer" onclick="openPDP(${p.id})">
                <img src="${p.images[0]}" class="w-full aspect-square object-cover rounded-xl mb-6">
                <h3 class="text-xl font-medium mb-2">${p.name}</h3>
                <p class="text-gray-400">From ₹${p.price}</p>
            </div>
        `).join('');
        window.scrollTo(0,0);
    }

    function openPDP(id) {
        const p = state.products.find(x=>x.id===id);
        document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
        const pdp = document.getElementById('pdp-sec');
        pdp.classList.remove('hidden');
        
        pdp.innerHTML = `
            <div class="grid grid-cols-1 md:grid-cols-2 gap-20">
                <div class="space-y-6">
                    ${p.images.map(img => `<img src="${img}" class="w-full rounded-3xl">`).join('')}
                </div>
                <div>
                    <h1 class="text-5xl font-semibold mb-4">${p.name}</h1>
                    <p class="text-2xl text-gray-400 mb-10">₹${p.price}</p>
                    <p class="text-lg text-gray-300 mb-10 leading-relaxed">Experience ultimate luxury with the ${p.name}. Crafted with precision and the finest materials for those who demand excellence.</p>
                    <button onclick="addToBag(${p.id})" class="apple-btn w-full py-4 text-lg">Add to Bag</button>
                    <div class="mt-10 pt-10 border-t border-gray-800 space-y-4">
                        <p class="text-sm text-gray-500 flex items-center gap-2"><svg width="16" height="16" fill="currentColor"><path d="M12 2H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2zm-1 7H5V7h6v2z"/></svg> Free Delivery & Returns</p>
                        <p class="text-sm text-gray-500 flex items-center gap-2"><svg width="16" height="16" fill="currentColor"><path d="M12 2H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2z"/></svg> Order today, receive by Friday</p>
                    </div>
                </div>
            </div>
        `;
        window.scrollTo(0,0);
    }

    function addToBag(id) {
        cart.push(state.products.find(x => x.id === id));
        updateCart();
        togglePanel('cart-panel');
    }

    function updateCart() {
        document.getElementById('cart-count').innerText = cart.length;
        document.getElementById('cart-list').innerHTML = cart.map((item, index) => `
            <div class="flex gap-4 items-center">
                <img src="${item.images[0]}" class="w-16 h-16 rounded-xl object-cover">
                <div class="flex-1 text-sm">
                    <p class="font-medium">${item.name}</p>
                    <p class="text-gray-500">₹${item.price}</p>
                </div>
                <button onclick="removeFromCart(${index})" class="text-gray-500">&times;</button>
            </div>
        `).join('');
        const total = cart.reduce((sum, item) => sum + parseInt(item.price), 0);
        document.getElementById('total-price').innerText = `₹${total}`;
    }

    function removeFromCart(index) { cart.splice(index, 1); updateCart(); }

    function startCheckout() {
        if(cart.length === 0) return;
        togglePanel('cart-panel');
        document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
        document.getElementById('checkout-sec').classList.remove('hidden');
    }

    function placeOrder() {
        const oid = 'YRM-' + Math.floor(Math.random() * 900000);
        state.orders.unshift({
            id: oid,
            customer: document.getElementById('c-name').value,
            items: [...cart],
            status: 'Processing'
        });
        save(); cart = []; updateCart();
        document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
        document.getElementById('thanks-sec').classList.remove('hidden');
        document.getElementById('final-oid').innerText = oid;
    }

    function trackOrder() {
        const id = document.getElementById('t-input').value;
        const o = state.orders.find(x => x.id === id);
        document.getElementById('track-result').innerText = o ? o.status : "Not Found";
    }

    function adminTab(t) {
        document.getElementById('admin-add-view').classList.toggle('hidden', t !== 'add');
        document.getElementById('admin-order-view').classList.toggle('hidden', t !== 'orders');
        if(t === 'orders') renderOrders();
    }

    function renderOrders() {
        document.getElementById('admin-order-view').innerHTML = state.orders.map(o => `
            <div class="p-4 bg-black rounded-xl text-[12px] space-y-2">
                <div class="flex justify-between"><b>${o.id}</b> <span class="text-blue-500">${o.status}</span></div>
                <p>Customer: ${o.customer}</p>
                <div class="flex gap-2">
                    <button onclick="updStat('${o.id}', 'Shipped')" class="bg-white/10 px-2 py-1 rounded">Ship</button>
                    <button onclick="updStat('${o.id}', 'Delivered')" class="bg-green-600 px-2 py-1 rounded">Deliver</button>
                </div>
            </div>
        `).join('');
    }
    function updStat(id, s) { state.orders.find(o=>o.id===id).status = s; save(); renderOrders(); }
</script>
</body>
</html>


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YARMA | Luxury Collective</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; margin: 0; overflow-x: hidden; }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.4; }
        .nav-main { position: fixed; top: 0; width: 100%; z-index: 1000; padding: 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.9); border-bottom: 1px solid #111; }
        .btn-menu { border: 1px solid #333; padding: 8px 15px; font-size: 10px; font-weight: 900; letter-spacing: 2px; }
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 0 20px; }
        .hero h1 { font-family: 'Syncopate', sans-serif; font-size: clamp(2.5rem, 12vw, 7rem); line-height: 1; margin-bottom: 20px; letter-spacing: -2px; }
        .hero p { max-width: 500px; font-size: 10px; letter-spacing: 1.5px; opacity: 0.5; text-transform: uppercase; line-height: 1.8; }
        .panel { position: fixed; top: 0; right: 0; height: 100%; width: 100%; max-width: 450px; background: #080808; z-index: 2000; transform: translateX(100%); transition: 0.5s; padding: 40px; border-left: 1px solid #1a1a1a; overflow-y: auto; }
        .panel.active { transform: translateX(0); }
        .btn-back { background: #1a1a1a; color: #fff; padding: 8px 15px; font-size: 10px; font-weight: 900; margin-bottom: 30px; border: 1px solid #333; cursor: pointer; display: inline-block; }
        .admin-in { background: #111; border: 1px solid #222; padding: 15px; width: 100%; color: #fff; margin-bottom: 10px; font-size: 12px; outline: none; }
        .btn-lux { background: #fff; color: #000; padding: 18px; width: 100%; font-weight: 900; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; border: none; margin-top: 10px; }
        .status-select { background: #222; color: #fff; padding: 5px; font-size: 10px; border: 1px solid #444; width: 100%; margin-top: 5px; }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<nav class="nav-main">
    <button onclick="openPanel('menu-panel')" class="btn-menu">MENU</button>
    <div style="font-family:'Syncopate'; font-size: 22px; font-weight: 700; color: #ff0000;">YARMA</div>
    <div onclick="openPanel('cart-panel')" class="relative cursor-pointer">
        <span id="cart-count" class="absolute -top-2 -right-2 bg-red-600 text-[8px] w-4 h-4 rounded-full flex items-center justify-center">0</span>
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
    </div>
</nav>

<section class="hero">
    <h1>YARMA</h1>
    <p>High-end collective bridging street culture and luxury craftsmanship.</p>
    <button onclick="document.getElementById('shop').scrollIntoView()" class="mt-10 border-b border-red-600 pb-2 text-[9px] font-bold tracking-[4px] uppercase">Browse Vault</button>
</section>

<section id="shop" class="py-20 px-6 max-w-7xl mx-auto">
    <div id="product-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10"></div>
</section>

<div id="menu-panel" class="panel">
    <button onclick="closePanels()" class="btn-back">← BACK</button>
    <h2 style="font-family:'Syncopate'; font-size: 14px; margin-bottom: 40px; color: #ff0000;">NAVIGATION</h2>
    <div class="flex flex-col gap-8 font-bold text-xl">
        <button onclick="closePanels()" class="text-left">SHOP</button>
        <button onclick="openPanel('track-panel')" class="text-left">TRACK ORDER</button>
        <button onclick="enterAdmin()" class="opacity-10 mt-20 text-[10px] text-left">ADMIN ACCESS</button>
    </div>
</div>

<div id="track-panel" class="panel">
    <button onclick="openPanel('menu-panel')" class="btn-back">← BACK</button>
    <h2 style="font-family:'Syncopate'; font-size: 14px; margin-bottom: 20px;">TRACKING</h2>
    <input type="text" id="tInput" class="admin-in" placeholder="ORDER ID (YRM-XXXX)">
    <button onclick="trackNow()" class="btn-lux">Trace Status</button>
    <div id="tResult" class="mt-12 text-center font-bold text-2xl text-red-600"></div>
</div>

<div id="admin-panel" class="panel !max-w-[500px]">
    <button onclick="closePanels()" class="btn-back">← BACK</button>
    <div class="flex gap-5 mb-8 border-b border-white/5 pb-4 text-[10px] font-bold">
        <button onclick="switchTab('inv')">INVENTORY</button>
        <button onclick="switchTab('ord')">ORDERS</button>
    </div>
    
    <div id="inv-view">
        <input type="text" id="pName" class="admin-in" placeholder="PRODUCT NAME">
        <input type="number" id="pPrice" class="admin-in" placeholder="PRICE">
        <input type="text" id="pImg" class="admin-in" placeholder="DIRECT JPG LINK">
        <button onclick="addP()" class="btn-lux">Publish</button>
        <div id="admin-list" class="mt-10 space-y-2"></div>
    </div>

    <div id="ord-view" class="hidden">
        <div id="ord-list" class="space-y-4"></div>
    </div>
</div>

<script>
    let products = JSON.parse(localStorage.getItem('yr_p')) || [];
    let orders = JSON.parse(localStorage.getItem('yr_o')) || [];

    function enterAdmin() { if(prompt("ACCESS:") === "ishaangund") { openPanel('admin-panel'); loadInv(); loadOrd(); } }

    function addP() {
        const name = document.getElementById('pName').value;
        const price = document.getElementById('pPrice').value;
        const img = document.getElementById('pImg').value;
        if(!name || !img) return alert("Fill data!");
        products.unshift({ id: Date.now(), name, price, img });
        localStorage.setItem('yr_p', JSON.stringify(products));
        render(); loadInv(); alert("Product Added.");
    }

    function updateOrderStatus(oid, newStatus) {
        const o = orders.find(x => x.id === oid);
        if(o) { o.status = newStatus; localStorage.setItem('yr_o', JSON.stringify(orders)); loadOrd(); }
    }

    function loadOrd() {
        document.getElementById('ord-list').innerHTML = orders.map(o => `
            <div class="p-4 bg-white/5 border border-white/10 text-[10px]">
                <p>ORDER: ${o.id}</p>
                <p>STATUS: <span class="text-red-600 font-bold">${o.status}</span></p>
                <select class="status-select" onchange="updateOrderStatus('${o.id}', this.value)">
                    <option value="">Update Status...</option>
                    <option value="Order Packed">Order Packed</option>
                    <option value="Ready to Ship">Ready to Ship</option>
                    <option value="Shipped">Shipped</option>
                    <option value="Reached Your City">Reached Your City</option>
                    <option value="Out for Delivery">Out for Delivery</option>
                    <option value="Delivered">Delivered</option>
                </select>
            </div>
        `).join('') || "No orders.";
    }

    function trackNow() {
        const id = document.getElementById('tInput').value.trim().toUpperCase();
        const o = orders.find(x => x.id === id);
        document.getElementById('tResult').innerText = o ? o.status : "NOT FOUND";
    }

    function render() {
        document.getElementById('product-list').innerHTML = products.map(p => `
            <div class="bg-[#050505] border border-[#111]">
                <img src="${p.img}" class="w-full aspect-[3/4] object-cover">
                <div class="p-8 text-center">
                    <p class="text-[9px] opacity-40 uppercase tracking-widest mb-1">${p.name}</p>
                    <p class="text-2xl font-black">₹${p.price}</p>
                </div>
            </div>
        `).join('');
    }

    function openPanel(id) { closePanels(); document.getElementById(id).classList.add('active'); }
    function closePanels() { document.querySelectorAll('.panel').forEach(p => p.classList.remove('active')); }
    function switchTab(t) { document.getElementById('inv-view').classList.toggle('hidden', t!=='inv'); document.getElementById('ord-view').classList.toggle('hidden', t!=='ord'); }
    function loadInv() { document.getElementById('admin-list').innerHTML = products.map(p => `<div class="flex justify-between p-3 bg-white/5 text-[10px]"><span>${p.name}</span><button onclick="delP(${p.id})" class="text-red-600 font-bold">DEL</button></div>`).join(''); }
    function delP(id) { products = products.filter(x => x.id !== id); localStorage.setItem('yr_p', JSON.stringify(products)); render(); loadInv(); }

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bg-canvas'), alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    const knot = new THREE.Mesh(new THREE.TorusKnotGeometry(10, 3, 100, 16), new THREE.MeshBasicMaterial({ color: 0x440000, wireframe: true }));
    scene.add(knot); camera.position.z = 30;
    function anim() { requestAnimationFrame(anim); knot.rotation.y += 0.003; renderer.render(scene, camera); }
    anim(); render();
</script>
</body>
</html>
